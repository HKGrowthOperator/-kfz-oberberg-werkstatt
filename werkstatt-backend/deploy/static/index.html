<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href='data:application/json,{"name":"KFZ-Service Oberberg","short_name":"Werkstatt","display":"standalone","background_color":"%23ECE9E2","theme_color":"%23157A4E","start_url":"."}'>

<title>Werkstatt-System · KFZ-Service Oberberg</title>
<style>
  :root{
    --ink:#16150F; --paper:#fff; --bg:#ECE9E2; --tint:#F7F5F0;
    --text:#2B2A24; --soft:#5C594F; --faint:#8E8B80; --line:#E1DDD3;
    --green:#1FA368; --green-deep:#157A4E; --green-wash:#E6F1EA; --red:#B3341F; --amber:#B8860B; --amber-wash:#fdf1e3;
    --sans:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    --disp:'Bricolage Grotesque',var(--sans);
  }
  @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
  @media(max-width:900px){.app{grid-template-columns:1fr}.side{display:none}}
  .side{background:var(--paper);border-right:1px solid var(--line);padding:14px 12px;display:flex;flex-direction:column;gap:3px;height:100vh;position:sticky;top:0;overflow:auto}
  .logo{display:flex;align-items:center;gap:10px;padding:6px 8px 12px;border-bottom:1px solid var(--line);margin-bottom:6px}
  .logo .sq{width:38px;height:38px;border-radius:11px;background:var(--green-deep);color:#fff;display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:19px}
  .logo b{font-family:var(--disp);font-weight:800;color:var(--ink);font-size:14.5px;display:block;line-height:1.1}
  .logo small{color:var(--faint);font-size:11px}
  .grp{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;padding:12px 10px 4px}
  .nav{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;color:var(--text);font-weight:600;font-size:13px;cursor:pointer}
  .nav:hover{background:var(--tint)}
  .nav.on{background:var(--green-wash);color:var(--green-deep)}
  .nav svg{width:18px;height:18px;flex:none;stroke:currentColor;stroke-width:1.7;fill:none}
  .nav span{flex:1}
  .nav .cnt{flex:none;font-size:11px;font-weight:700;color:var(--faint);background:var(--tint);padding:1px 7px;border-radius:999px}
  .nav.on .cnt{background:#fff;color:var(--green-deep)}
  .nav .bdg{flex:none;font-size:10px;font-weight:800;color:#fff;background:var(--red);padding:1px 7px;border-radius:999px}
  .goal{margin-top:auto;background:var(--tint);border:1px solid var(--line);border-radius:12px;padding:13px}
  .goal .r{display:flex;justify-content:space-between;font-size:12px}.goal b{font-weight:700;color:var(--ink)}
  .goal .bar{height:7px;background:#E3E1D8;border-radius:5px;overflow:hidden;margin:8px 0 6px}
  .goal .bar>span{display:block;height:100%;background:var(--green-deep);border-radius:5px}
  .goal .sub2{font-size:11px;color:var(--faint)}.goal .sub2 a{color:var(--green-deep);font-weight:700;cursor:pointer}
  .mainCol{background:var(--bg);min-width:0;display:flex;flex-direction:column}
  .top{display:flex;align-items:center;gap:12px;padding:12px 22px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:6}
  .search{flex:1;max-width:480px;display:flex;align-items:center;gap:8px;background:var(--tint);border:1px solid var(--line);border-radius:10px;padding:0 12px}
  .search svg{width:16px;height:16px;stroke:var(--faint);stroke-width:1.8;fill:none;flex:none}
  .search input{flex:1;border:none;background:transparent;padding:9px 0;color:var(--text);outline:none}
  .search .kbd{font-size:11px;background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 6px;color:var(--faint)}
  .btn{display:inline-flex;align-items:center;gap:7px}
  .btn .i16{width:15px;height:15px;stroke:currentColor;stroke-width:1.9;fill:none}
  .ic{width:37px;height:37px;border-radius:9px;border:1px solid var(--line);background:#fff;display:grid;place-items:center;position:relative;cursor:pointer;flex:none}
  .ic svg{width:17px;height:17px;stroke:var(--text);stroke-width:1.8;fill:none}
  .dot{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;padding:0 4px;border-radius:999px;display:grid;place-items:center;border:2px solid #fff}
  .user{display:flex;align-items:center;gap:9px;cursor:pointer}
  .user .ava{width:35px;height:35px;border-radius:999px;background:var(--green-deep);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
  .user b{display:block;font-size:13px;color:var(--ink);line-height:1.1}.user small{font-size:11px;color:var(--faint)}
  #main{padding:22px 24px 40px}
  .crumb{font-size:12px;color:var(--faint);margin-bottom:5px}.crumb b{color:var(--text)}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px}
  h1{font-family:var(--disp);font-style:italic;font-weight:800;font-size:31px;color:var(--ink);letter-spacing:-.02em}
  .hsub{color:var(--faint);font-size:13.5px;margin-top:3px}.hsub b{color:var(--green-deep);font-weight:700}
  .hact{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .seg{display:inline-flex;background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:3px}
  .seg span{padding:6px 11px;font-size:12px;font-weight:700;color:var(--faint);border-radius:6px;cursor:pointer}.seg span.on{background:var(--tint);color:var(--ink)}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:16px}
  @media(max-width:1100px){.mgrid{grid-template-columns:repeat(2,1fr)}}@media(max-width:560px){.mgrid{grid-template-columns:1fr}}
  .mcard{padding:20px 20px 0;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}.mcard:hover{box-shadow:0 2px 4px rgba(22,21,15,.05),0 18px 40px -22px rgba(22,21,15,.3);transform:translateY(-1px)}
  .mt{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .mtile{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:none}.mtile svg{width:19px;height:19px;stroke-width:1.8;fill:none}
  .mlab{font-weight:700;color:var(--ink);font-size:14px}
  .mval{display:flex;align-items:baseline;gap:10px}.mval .num{font-family:var(--disp);font-style:italic;font-weight:800;font-size:31px;color:var(--ink);letter-spacing:-.02em}
  .chg{font-size:13px;font-weight:800;display:inline-flex;gap:3px}.chg.up{color:var(--green)}.chg.down{color:var(--red)}
  .spark{margin:14px -20px 0;height:66px;display:block;width:calc(100% + 40px)}
  .drow{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:16px}
  .drow2{display:grid;grid-template-columns:1fr 1.3fr;gap:16px}
  @media(max-width:980px){.drow,.drow2{grid-template-columns:1fr}}
  .ch{padding:18px}
  .chh{display:flex;align-items:center;gap:10px;margin-bottom:6px}
  .chh .ti{width:31px;height:31px;border-radius:9px;background:var(--green-wash);display:grid;place-items:center}.chh .ti svg{width:16px;height:16px;stroke:var(--green-deep);stroke-width:1.8;fill:none}
  .chh b{font-family:var(--disp);font-weight:700;color:var(--ink);font-size:16.5px}
  .chh .leg{margin-left:auto;display:flex;gap:12px;font-size:11.5px;color:var(--faint);font-weight:600}
  .chh .leg i{width:12px;height:2px;display:inline-block;border-radius:2px;margin-right:4px;vertical-align:middle}
  .donut{display:flex;align-items:center;gap:16px;margin-top:6px;flex-wrap:wrap}
  .donut .dleg{flex:1;min-width:140px;display:grid;gap:9px}
  .donut .dleg .r{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text)}.donut .dleg .r b{margin-left:auto;color:var(--ink);font-weight:700}.donut .dleg .r i{width:9px;height:9px;border-radius:3px;flex:none}
  .meta{border-top:1px solid var(--line);margin-top:14px;padding-top:11px;display:grid;gap:7px}.meta .r{display:flex;justify-content:space-between;font-size:12.5px}.meta .r span{color:var(--faint)}.meta .r b{color:var(--ink)}
  .rep{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}.rep:last-child{border-bottom:none}
  .rep .ti2{width:32px;height:32px;border-radius:9px;background:var(--tint);display:grid;place-items:center;font-size:15px;flex:none}
  .rep b{color:var(--ink);font-size:13px;display:block}.rep small{color:var(--faint);font-size:11.5px}
  .rep .repact{margin-left:auto;display:flex;gap:6px}
  .srcrow{margin-bottom:13px}.srcrow .rr{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}.srcrow .rr span{color:var(--text)}.srcrow .rr b{color:var(--ink);font-weight:700}
  .track{height:8px;background:var(--tint);border-radius:5px;overflow:hidden}.track>span{display:block;height:100%;background:var(--green-deep);border-radius:5px}
  h2{font-family:var(--disp);font-weight:800;font-size:20px;letter-spacing:-.02em;color:var(--ink);margin-bottom:4px}
  .muted{color:var(--faint);font-size:12.5px}
  .row{display:flex;gap:12px;flex-wrap:wrap}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px;box-shadow:0 1px 2px rgba(22,21,15,.03),0 12px 30px -20px rgba(22,21,15,.22)}
  .grid{display:grid;gap:12px}
  @media(min-width:640px){.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}}
  label.f{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:5px}
  input.i,select.i,textarea.i{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--paper);color:var(--text)}
  input.i:focus,select.i:focus,textarea.i:focus{outline:2px solid var(--green);border-color:var(--green)}
  .btn{border:none;background:var(--green);color:#fff;font-weight:700;padding:10px 16px;border-radius:9px;font-size:14px}
  .btn:hover{background:var(--green-deep)}
  .btn.sec{background:var(--tint);color:var(--ink);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--green-deep);padding:6px 10px}
  .btn.sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13.5px}
  th{font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);font-weight:700;background:var(--tint)}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
  .pill.offen{background:var(--amber-wash);color:var(--amber)}
  .pill.bezahlt,.pill.angenommen{background:var(--green-wash);color:var(--green-deep)}
  .pill.abgelehnt{background:#f7e3df;color:var(--red)}
  .pill.kva{background:#e7eef7;color:#2c5b8f}
  .pill.au{background:#f3ead9;color:#8a6d1f}
  .pill.erledigt{background:var(--green-wash);color:var(--green-deep)}
  .pill.re{background:var(--green-wash);color:var(--green-deep)}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .empty{text-align:center;color:var(--faint);padding:36px;border:1px dashed var(--line);border-radius:12px}
  .totbox{margin-left:auto;width:min(320px,100%);display:grid;gap:6px;margin-top:12px}
  .totbox .tr{display:flex;justify-content:space-between;font-size:14px}
  .totbox .tr.big{font-family:var(--disp);font-weight:800;font-size:19px;color:var(--ink);border-top:2px solid var(--green);padding-top:8px;margin-top:4px}
  .flex-between{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .chip{font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:999px;background:var(--tint);cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .posrow{display:grid;grid-template-columns:1fr 70px 100px 70px 90px 32px;gap:8px;align-items:center;margin-bottom:8px}
  .poshead{grid-template-columns:1fr 70px 100px 70px 90px 32px;display:grid;gap:8px;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--faint);font-weight:700;margin-bottom:6px}
  @media(max-width:620px){.posrow,.poshead{grid-template-columns:1fr 60px 84px 84px}.posrow .del{grid-column:1/-1;justify-self:end}.poshead{display:none}}
  .x{border:none;background:transparent;color:var(--red);font-size:18px;line-height:1}
  .hint{background:var(--green-wash);border:1px solid #cfe6d8;border-left:3px solid var(--green);border-radius:8px;padding:10px 14px;font-size:12.5px;color:var(--ink);margin-bottom:14px}
  .warn{background:var(--amber-wash);border:1px solid #f0dcc0;border-left:3px solid var(--amber);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#6b5300;margin-bottom:14px}
  /* reminders */
  .rem{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:10px;margin-bottom:10px;background:var(--paper)}
  .rem .ic{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;font-size:20px}
  .rem.over{border-left:4px solid var(--red)} .rem.soon{border-left:4px solid var(--amber)} .rem.bday{border-left:4px solid var(--green)}
  .rem .t{font-weight:700;color:var(--ink)} .rem .s{font-size:12.5px;color:var(--faint)}
  .rem .act{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .kpi{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:18px}
  .kpi .c{background:var(--tint);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .kpi .n{font-family:var(--disp);font-weight:800;font-size:24px;color:var(--ink)} .kpi .l{font-size:12px;color:var(--faint)}
  /* print */
  #printArea{display:none}
  .inv{max-width:800px;margin:0 auto;background:#fff;color:#111;padding:40px;font-size:13px}
  .inv .top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:30px}
  .inv .logo{font-family:var(--disp);font-weight:800;font-size:20px}
  .inv .absender{font-size:10px;color:#666;margin-bottom:4px;text-decoration:underline}
  .inv h1{font-family:var(--disp);font-size:24px;margin:24px 0 4px}
  .inv .meta{display:flex;gap:30px;flex-wrap:wrap;color:#444;font-size:12px;margin-bottom:22px}
  .inv table{width:100%;border-collapse:collapse;margin:10px 0}
  .inv th{background:#f2f2f2;color:#333;font-size:10px}
  .inv th,.inv td{border-bottom:1px solid #ddd;padding:8px 10px}
  .inv .foot{margin-top:30px;font-size:11px;color:#555;display:flex;gap:30px;flex-wrap:wrap;border-top:1px solid #ddd;padding-top:14px}
  .inv .foot div{min-width:150px}
  @media print{body{background:#fff}.app{display:none!important}#printArea{display:block!important}.inv{padding:0;max-width:none}}
</style>

<div class="app">
  <aside class="side">
    <div class="logo"><div class="sq">K</div><div><b id="hFirma">KFZ-Service</b><small>Oberberg · Werkstatt</small></div></div>
    <div id="nav"></div>
    <div class="goal" id="goal"></div>
  </aside>
  <div class="mainCol">
    <div class="top">
      <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><input id="q" placeholder="Kunden, Rechnungen, Fahrzeuge suchen…" oninput="doSearch(this.value)"><span class="kbd">⌘K</span></div>
      <button class="btn sec" onclick="exportData()"><svg class="i16" viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Export</button>
      <button class="btn" onclick="newDoc()"><svg class="i16" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Neue Rechnung</button>
      <div class="ic" title="Dashboard" onclick="go('dashboard')"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div class="ic" title="Erinnerungen" onclick="go('erinnerungen')"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 10-12 0c0 7-3 8-3 8h18s-3-1-3-8"/><path d="M10 21a2 2 0 004 0"/></svg><span class="dot" id="bellDot" style="display:none">0</span></div>
      <div class="user" onclick="go('einstellungen')"><div class="ava" id="ava">AC</div><div><b id="uName">Ahmet Celik</b><small>Inhaber</small></div></div>
    </div>
    <div id="main"></div>
  </div>
</div>
<div id="printArea"></div>

<script>
const K={set:'kfz_settings',cust:'kfz_customers',item:'kfz_items',inv:'kfz_invoices'};
const load=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const save=(k,v)=>localStorage.setItem(k,JSON.stringify(v));
const uid=()=>Math.random().toString(36).slice(2,9);
const eur=n=>(n||0).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const esc=s=>(s??'').toString().replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const deDate=iso=>{if(!iso)return'';const[y,m,d]=iso.split('-');return d+'.'+m+'.'+y};
const addMonths=(iso,m)=>{if(!iso)return'';const d=new Date(iso);d.setMonth(d.getMonth()+ (+m||0));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};
const daysUntil=iso=>{if(!iso)return null;const a=new Date(todayISO()),b=new Date(iso);return Math.round((b-a)/86400000)};

const DEF_TPL={
 hu:{betreff:'Erinnerung: HU/AU steht an – {fahrzeug} {kennzeichen}',text:'Hallo {name},\n\nbei Ihrem Fahrzeug {fahrzeug} ({kennzeichen}) steht die HU/AU zum {datum} an. Wir übernehmen das gerne für Sie – melden Sie sich einfach für einen Termin.\n\nViele Grüße\n{firma}'},
 oel:{betreff:'Zeit für den nächsten Ölwechsel – {fahrzeug}',text:'Hallo {name},\n\nfür Ihr Fahrzeug {fahrzeug} ({kennzeichen}) empfehlen wir den nächsten Ölwechsel (fällig bis {datum}). Vereinbaren Sie gerne einen Termin bei uns.\n\nViele Grüße\n{firma}'},
 inspektion:{betreff:'Inspektion fällig – {fahrzeug}',text:'Hallo {name},\n\ndie nächste Inspektion für Ihr Fahrzeug {fahrzeug} ({kennzeichen}) ist fällig (bis {datum}). Wir kümmern uns gerne darum.\n\nViele Grüße\n{firma}'},
 geburtstag:{betreff:'Alles Gute zum Geburtstag, {name}!',text:'Hallo {name},\n\nwir wünschen Ihnen alles Gute zum Geburtstag und ein rundum gutes Jahr!\n\nHerzliche Grüße\nIhr Team von {firma}'},
 mahnung:{betreff:'Zahlungserinnerung zu Rechnung {nr}',text:'Hallo {name},\n\nunsere Rechnung {nr} über {betrag} ist noch offen. Bitte gleichen Sie den Betrag in den nächsten Tagen aus. Sollte sich das überschnitten haben, betrachten Sie diese Nachricht als gegenstandslos.\n\nViele Grüße\n{firma}'},

function computeReminders(){
  const out=[];const lead=+settings.remLead||30;
  customers.forEach(c=>{
    const veh=(c.fahrzeug||'')+(c.kennzeichen?' ':'');
    const ctx={name:c.name,fahrzeug:c.fahrzeug||'',kennzeichen:c.kennzeichen||'',firma:settings.firma};
    if(c.huFaellig){const d=daysUntil(c.huFaellig);if(d!==null&&d<=lead)out.push({type:'hu',c,datum:c.huFaellig,days:d,titel:'HU/AU fällig',ctx});}
    if(c.oelLetzte){const due=addMonths(c.oelLetzte,c.oelInt||12);const d=daysUntil(due);if(d!==null&&d<=lead)out.push({type:'oel',c,datum:due,days:d,titel:'Ölwechsel fällig',ctx});}
    if(c.inspLetzte){const due=addMonths(c.inspLetzte,c.inspInt||24);const d=daysUntil(due);if(d!==null&&d<=lead)out.push({type:'inspektion',c,datum:due,days:d,titel:'Inspektion fällig',ctx});}
    if(c.geburtstag){const g=c.geburtstag.split('-');const t=new Date();let nb=new Date(t.getFullYear(),+g[1]-1,+g[2]);if((nb-new Date(todayISO()))<0)nb=new Date(t.getFullYear()+1,+g[1]-1,+g[2]);const dd=Math.round((nb-new Date(todayISO()))/86400000);if(dd<=Math.min(lead,21))out.push({type:'geburtstag',c,datum:nb.getFullYear()+'-'+String(nb.getMonth()+1).padStart(2,'0')+'-'+String(nb.getDate()).padStart(2,'0'),days:dd,titel:'Geburtstag',ctx});}
  });
  return out.sort((a,b)=>a.days-b.days);
}

function saveDoc(thenPrint){
  if(!draft.kunde.name){alert('Bitte Kunde angeben.');return;}
  if(!draft.positionen.some(p=>p.bez)){alert('Mindestens eine Position mit Bezeichnung.');return;}
  const t=calc(draft);draft.positionen=draft.positionen.filter(p=>p.bez);
  Object.assign(draft,{netto:t.netto,steuer:t.steuer,brutto:t.brutto});
  const ex=invoices.find(x=>x.id===draft.id);
  if(ex){Object.assign(ex,draft);}
  else{
    const yr=new Date(draft.datum).getFullYear();
    if(draft.belegart==='kva'){draft.no=settings.kvaPrefix+yr+'-'+String(settings.nextKva).padStart(4,'0');settings.nextKva++;draft.status='offen';}
    else if(draft.belegart==='auftrag'){draft.no=settings.auftragPrefix+yr+'-'+String(settings.nextAuftrag).padStart(4,'0');settings.nextAuftrag++;draft.status='offen';}
    else{draft.no=settings.prefix+yr+'-'+String(settings.nextNo).padStart(4,'0');settings.nextNo++;draft.status='offen';}
    save(K.set,settings);draft.createdAt=Date.now();invoices.push(draft);
    if(draft.belegart==='rechnung'){let ch=false;draft.positionen.forEach(p=>{if(p.partId){const pt=parts.find(x=>x.id===p.partId);if(pt){pt.bestand=(+pt.bestand||0)-(+p.menge||0);ch=true;}}});if(ch)save('kfz_parts',parts);}
  }
  save(K.inv,invoices);const id=draft.id;draft=null;
  if(thenPrint)printDoc(id);
  go('dokumente');
}

  if(docFilter==='kva')rows=rows.filter(r=>r.belegart==='kva');
  if(docFilter==='auftrag')rows=rows.filter(r=>r.belegart==='auftrag');

         :r.belegart==='auftrag'?`<button class="btn ghost sm" onclick="convertTo('${r.id}','rechnung')">→ Rechnung</button><button class="btn ghost sm" onclick="setStatus('${r.id}','${r.status==='erledigt'?'offen':'erledigt'}')">${r.status==='erledigt'?'→ offen':'✓ erledigt'}</button>`
         :`<button class="btn ghost sm" onclick="setStatus('${r.id}','${r.status==='bezahlt'?'offen':'bezahlt'}')">${r.status==='bezahlt'?'→ offen':'→ bezahlt'}</button><button class="btn ghost sm" onclick="xrechnungExport('${r.id}')">XRechnung</button>${r.status==='bezahlt'?`<a class="btn ghost sm" href="${mailLink(custEmail(r.kunde.name),settings.tpl.bewertung,{name:r.kunde.name,firma:settings.firma,link:settings.googleReview||''},r.datum)}">★ Bewertung</a>`:''}`}

function setStatus(id,s){const i=invoices.find(x=>x.id===id);i.status=s;save(K.inv,invoices);render();}
function delDoc(id){if(confirm('Beleg löschen?')){invoices=invoices.filter(x=>x.id!==id);save(K.inv,invoices);render();}}
function editDoc(id){draft=JSON.parse(JSON.stringify(invoices.find(x=>x.id===id)));draft._edit=true;go('neu');}
function convertTo(id,target){const k=invoices.find(x=>x.id===id);if(!k)return;draft=JSON.parse(JSON.stringify(k));draft.id=uid();draft.belegart=target;draft.no=null;draft._edit=false;draft.status='offen';delete draft.createdAt;delete draft.bezahltAm;go('neu');}
function xrechnungExport(id){const r=invoices.find(x=>x.id===id);if(!r)return;const s=settings;const x=v=>String(v??'').replace(/[<&>]/g,c=>({'<':'&lt;','&':'&amp;','>':'&gt;'}[c]));
  const lines=r.positionen.map((p,i)=>`  <cac:InvoiceLine><cbc:ID>${i+1}</cbc:ID><cbc:InvoicedQuantity unitCode="H87">${p.menge||0}</cbc:InvoicedQuantity><cbc:LineExtensionAmount currencyID="EUR">${((p.menge||0)*(p.einzel||0)).toFixed(2)}</cbc:LineExtensionAmount><cac:Item><cbc:Name>${x(p.bez)}</cbc:Name><cac:ClassifiedTaxCategory><cbc:ID>${s.kleinunternehmer?'E':'S'}</cbc:ID><cbc:Percent>${s.kleinunternehmer?0:(p.mwst||0)}</cbc:Percent><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:ClassifiedTaxCategory></cac:Item><cac:Price><cbc:PriceAmount currencyID="EUR">${(p.einzel||0).toFixed(2)}</cbc:PriceAmount></cac:Price></cac:InvoiceLine>`).join('\n');
  const xml=`<?xml version="1.0" encoding="UTF-8"?>
<ubl:Invoice xmlns:ubl="urn:oasis:names:specification:ubl:schema:xsd:Invoice-2" xmlns:cac="urn:oasis:names:specification:ubl:schema:xsd:CommonAggregateComponents-2" xmlns:cbc="urn:oasis:names:specification:ubl:schema:xsd:CommonBasicComponents-2">
  <cbc:CustomizationID>urn:cen.eu:en16931:2017#compliant#urn:xoev-de:kosit:standard:xrechnung_3.0</cbc:CustomizationID>
  <cbc:ID>${x(r.no)}</cbc:ID>
  <cbc:IssueDate>${r.datum}</cbc:IssueDate>
  <cbc:InvoiceTypeCode>380</cbc:InvoiceTypeCode>
  <cbc:DocumentCurrencyCode>EUR</cbc:DocumentCurrencyCode>
  <cac:AccountingSupplierParty><cac:Party><cac:PartyName><cbc:Name>${x(s.firma)}</cbc:Name></cac:PartyName><cac:PostalAddress><cbc:StreetName>${x(s.strasse)}</cbc:StreetName><cbc:CityName>${x(s.ort)}</cbc:CityName><cbc:PostalZone>${x(s.plz)}</cbc:PostalZone><cac:Country><cbc:IdentificationCode>DE</cbc:IdentificationCode></cac:Country></cac:PostalAddress><cac:PartyTaxScheme><cbc:CompanyID>${x(s.ustid||s.steuernr)}</cbc:CompanyID><cac:TaxScheme><cbc:ID>VAT</cbc:ID></cac:TaxScheme></cac:PartyTaxScheme></cac:Party></cac:AccountingSupplierParty>
  <cac:AccountingCustomerParty><cac:Party><cac:PartyName><cbc:Name>${x(r.kunde.name)}</cbc:Name></cac:PartyName><cac:PostalAddress><cbc:StreetName>${x(r.kunde.strasse)}</cbc:StreetName><cbc:CityName>${x(r.kunde.ort)}</cbc:CityName><cbc:PostalZone>${x(r.kunde.plz)}</cbc:PostalZone><cac:Country><cbc:IdentificationCode>DE</cbc:IdentificationCode></cac:Country></cac:PostalAddress></cac:Party></cac:AccountingCustomerParty>
  <cac:TaxTotal><cbc:TaxAmount currencyID="EUR">${(r.steuer||0).toFixed(2)}</cbc:TaxAmount></cac:TaxTotal>
  <cac:LegalMonetaryTotal><cbc:TaxExclusiveAmount currencyID="EUR">${(r.netto||0).toFixed(2)}</cbc:TaxExclusiveAmount><cbc:TaxInclusiveAmount currencyID="EUR">${(r.brutto||0).toFixed(2)}</cbc:TaxInclusiveAmount><cbc:PayableAmount currencyID="EUR">${(r.brutto||0).toFixed(2)}</cbc:PayableAmount></cac:LegalMonetaryTotal>
${lines}
</ubl:Invoice>`;
  dl(xml,'xrechnung-'+r.no+'.xml','application/xml');}

function saveCust(id,exists){
  const c={id,name:v('c_name'),geburtstag:v('c_geb'),strasse:v('c_str'),plz:v('c_plz'),ort:v('c_ort'),tel:v('c_tel'),email:v('c_mail'),

  if(!c.name){alert('Name fehlt');return;}

function dl(content,name,type){const b=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();}
function normDate(s){if(!s)return'';s=(s||'').trim();if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;const m=s.match(/^(\d{1,2})[.\/](\d{1,2})[.\/](\d{4})$/);if(m)return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');return'';}
function parseCSV(text){const first=(text.split('\n')[0]||'');const sep=first.includes(';')?';':',';const lines=text.replace(/\r/g,'').split('\n').filter(l=>l.trim());const head=lines.shift().split(sep).map(h=>h.trim().toLowerCase());return lines.map(l=>{const cells=l.split(sep);const o={};head.forEach((h,i)=>o[h]=(cells[i]||'').trim());return o;});}

function importCSV(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{

    const name=get('name','kunde','kundenname');if(!name)return;
    const kz=get('kennzeichen','kfz-kennzeichen','kfz kennzeichen');
    const data={name,email:get('email','e-mail','mail'),tel:get('telefon','tel','handy','mobil'),geburtstag:normDate(get('geburtstag','geb','geburtsdatum')),fahrzeug:get('fahrzeug','modell','auto','kfz'),kennzeichen:kz,huFaellig:normDate(get('hu','hu_faellig','tuev','tüv','hauptuntersuchung')),oelLetzte:normDate(get('oelwechsel','oel','ölwechsel','letzter oelwechsel')),inspLetzte:normDate(get('inspektion','letzte inspektion'))};
    let c=customers.find(x=>(kz&&x.kennzeichen&&x.kennzeichen.toLowerCase()===kz.toLowerCase())||x.name.toLowerCase()===name.toLowerCase());
    if(c){Object.assign(c,data);c.oelInt=c.oelInt||12;c.inspInt=c.inspInt||24;upd++;}
    else{customers.push({id:uid(),oelInt:12,inspInt:24,...data});add++;}
  });
  save(K.cust,customers);renderNav();alert('CSV-Import: '+add+' neu, '+upd+' aktualisiert.');renderCustomers();
}catch(err){alert('CSV konnte nicht gelesen werden. Bitte die Vorlage nutzen (Spalten mit ; getrennt).');}};r.readAsText(f);}

function apptToday(){return appointments.filter(a=>a.datum===todayISO()&&a.status!=='abgesagt').length;}
function apptRow(a){const c=customers.find(x=>x.id===a.kundeId);const em=c?c.email:'';const ctx={name:a.kunde,fahrzeug:a.fahrzeug||'',kennzeichen:(c&&c.kennzeichen)||'',leistung:a.leistung||'',firma:settings.firma,uhrzeit:a.uhrzeit?(' um '+a.uhrzeit+' Uhr'):''};
  const st=a.status||'geplant';const stc={geplant:'offen',erledigt:'bezahlt',abgesagt:'abgelehnt'}[st];
  return `<div class="rep"><div class="ti2">📅</div><div><b>${deDate(a.datum)}${a.uhrzeit?' · '+a.uhrzeit:''} · ${esc(a.kunde)}</b><small>${esc(((a.fahrzeug||'')+' '+(a.leistung||'')).trim())||'—'} · <span class="pill ${stc}">${st}</span></small></div>
   <div class="repact">${em?`<a class="btn ghost sm" href="${mailLink(em,settings.tpl.terminbestaetigung,ctx,a.datum)}">✉ Bestätigung</a>`:''}<button class="btn ghost sm" onclick="editAppt('${a.id}')">Bearb.</button><button class="btn ghost sm" style="color:var(--red)" onclick="delAppt('${a.id}')">✕</button></div></div>`;}
function renderTermine(){
  const upcoming=[...appointments].filter(a=>a.datum>=todayISO()).sort((a,b)=>(a.datum+(a.uhrzeit||'')).localeCompare(b.datum+(b.uhrzeit||'')));
  const past=[...appointments].filter(a=>a.datum<todayISO()).sort((a,b)=>b.datum.localeCompare(a.datum));
  const heute=appointments.filter(a=>a.datum===todayISO()).length;
  main.innerHTML=`<div class="crumb">Arbeitsplatz › <b>Termine</b></div>
  <div class="head"><div><h1>Termine</h1><div class="hsub">${appointments.length} Termine · <b>${heute}</b> heute</div></div>
    <div class="hact"><button class="btn" onclick="editAppt()"><svg class="i16" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>Neuer Termin</button></div></div>
  <div id="apptForm"></div>
  <div class="card ch"><div class="chh"><div class="ti">${iconSvg(ICON.kalender)}</div><b>Anstehend</b></div>
   ${upcoming.length?upcoming.map(apptRow).join(''):'<div class="empty" style="margin-top:10px">Keine anstehenden Termine.</div>'}</div>
  ${past.length?`<div class="card ch" style="margin-top:16px"><div class="chh"><div class="ti">${iconSvg(ICON.kalender)}</div><b>Vergangen</b></div>${past.slice(0,20).map(apptRow).join('')}</div>`:''}`;
}

function custHistory(cid){const inv=invoices.filter(i=>i.kundeId===cid).sort((a,b)=>b.datum.localeCompare(a.datum));const appt=appointments.filter(a=>a.kundeId===cid).sort((a,b)=>b.datum.localeCompare(a.datum));if(!inv.length&&!appt.length)return '';

  ${inv.length?`<div style="overflow-x:auto"><table><thead><tr><th>Datum</th><th>Beleg</th><th class="num">Brutto</th><th>Status</th></tr></thead><tbody>${inv.slice(0,12).map(i=>`<tr><td>${deDate(i.datum)}</td><td>${esc(i.no)}</td><td class="num">${eur(i.brutto)}</td><td><span class="pill ${i.status}">${i.status}</span></td></tr>`).join('')}</tbody></table></div>`:'<div class="muted">Noch keine Belege.</div>'}
  ${appt.length?`<div class="muted" style="margin-top:8px">Termine: ${appt.slice(0,6).map(a=>deDate(a.datum)+(a.leistung?' ('+esc(a.leistung)+')':'')).join(' · ')}</div>`:''}`;}
function datevExport(y){const bez=invoices.filter(i=>i.belegart==='rechnung'&&i.status==='bezahlt'&&new Date(i.bezahltAm||i.datum).getFullYear()===y);const exY=expenses.filter(e=>new Date(e.datum).getFullYear()===y);
  const rows=[['Umsatz(Brutto)','Soll/Haben','Konto','Gegenkonto','Belegdatum','Belegfeld1','Buchungstext','Steuersatz']];
  bez.forEach(i=>rows.push([i.brutto.toFixed(2).replace('.',','),'H','8400','1200',deDate(i.bezahltAm||i.datum),i.no,'Umsatz '+(i.kunde.name||''),settings.kleinunternehmer?'0':'19']));
  exY.forEach(e=>rows.push([e.brutto.toFixed(2).replace('.',','),'S','4980','1200',deDate(e.datum),'','Kosten '+(e.beschreibung||''),String(e.mwst||0)]));
  dl(rows.map(r=>r.join(';')).join('\n'),'datev-buchungsstapel-'+y+'.csv','text/csv');}

function editPart(id){const p=id?parts.find(x=>x.id===id):{id:uid(),nummer:'',name:'',lieferant:'',ek:0,vk:0,bestand:0,minBestand:1};

   <div><label class="f">Lieferant</label><input class="i" id="p_lief" value="${esc(p.lieferant)}"></div>

function savePart(id,exists){const p={id,nummer:v('p_nr'),name:v('p_name'),lieferant:v('p_lief'),ek:+v('p_ek'),vk:+v('p_vk'),bestand:+v('p_best'),minBestand:+v('p_min')};if(!p.name){alert('Bezeichnung fehlt');return;}if(exists){const i=parts.findIndex(x=>x.id===id);parts[i]=p;}else parts.push(p);save('kfz_parts',parts);renderNav();renderParts();}
function delPart(id){if(confirm('Teil löschen?')){parts=parts.filter(x=>x.id!==id);save('kfz_parts',parts);renderNav();renderParts();}}
function partsCsvTemplate(){dl('Nummer;Bezeichnung;Lieferant;EK;VK;Bestand;Mindestbestand\nBRE-1234;Bremsbeläge vorne;Stahlgruber;18,50;39,90;4;2\n','teile-import-vorlage.csv','text/csv');}
function partsImportCSV(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const rows=parseCSV(r.result);let add=0,upd=0;rows.forEach(row=>{const g=(...k)=>{for(const x of k)if(row[x])return row[x];return'';};const nr=g('nummer','artikelnummer','oe','oe-nummer','artikel-nr');const name=g('bezeichnung','name','artikel');if(!name&&!nr)return;const data={nummer:nr,name:name||nr,lieferant:g('lieferant','händler','haendler'),ek:num(g('ek','einkauf','einkaufspreis')),vk:num(g('vk','verkauf','verkaufspreis','preis')),bestand:+num(g('bestand','menge'))||0,minBestand:+num(g('mindestbestand','min'))||0};let ex=parts.find(x=>nr&&x.nummer&&x.nummer.toLowerCase()===nr.toLowerCase());if(ex){Object.assign(ex,data);upd++;}else{parts.push({id:uid(),...data});add++;}});save('kfz_parts',parts);renderNav();alert('Teile-Import: '+add+' neu, '+upd+' aktualisiert.');renderParts();}catch(err){alert('CSV fehlerhaft. Bitte Vorlage nutzen.');}};r.readAsText(f);}
function addPartPos(pid){const p=parts.find(x=>x.id===pid);if(p)draft.positionen.push({bez:p.name+(p.nummer?' ('+p.nummer+')':''),menge:1,einzel:p.vk,mwst:settings.kleinunternehmer?0:19,partId:p.id});renderPos();}

}

let katLast=[];
async function katalogFetch(q){
  const url=(settings.teileConnectorUrl||'').trim();
  if(url){ // Live-Connector (selbst-gehostet)
    const r=await fetch(url.replace(/\/$/,'')+'/teile/suche',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({query:q,oe:q,limit:25})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();return (d.treffer||[]).map(t=>({nummer:t.artikelnr||t.nummer||'',oe:t.oe||'',name:t.bezeichnung||t.name||'',hersteller:t.hersteller||'',lieferant:t.lieferant||'',ek:t.ekPreis??t.ek??0,vk:t.vkPreis??t.vk??0,verfuegbar:t.verfuegbar,lieferzeit:t.lieferzeit}));
  }
  const s=q.toLowerCase().replace(/\s+/g,'');
  return TEILE_KATALOG.filter(t=>!s||[t.nummer,t.oe,t.name,t.hersteller].some(x=>(x||'').toLowerCase().replace(/\s+/g,'').includes(s)));
}
async function katalogSuche(){
  const q=(document.getElementById('kat_q').value||'').trim();const box=document.getElementById('katResults');
  box.innerHTML='<div class="muted">Suche läuft…</div>';
  try{
    katLast=await katalogFetch(q);
    if(!katLast.length){box.innerHTML='<div class="muted">Keine Treffer. Andere Nummer/Bezeichnung versuchen.</div>';return;}
    box.innerHTML=`<div style="overflow-x:auto"><table><thead><tr><th>Nummer / OE</th><th>Bezeichnung</th><th>Lieferant</th><th class="num">EK</th><th class="num">VK</th><th class="num">Verf.</th><th></th></tr></thead><tbody>${katLast.map((t,i)=>`<tr><td><b>${esc(t.nummer)}</b>${t.oe?`<br><small class="muted">OE ${esc(t.oe)}</small>`:''}</td><td>${esc(t.name)}<br><small class="muted">${esc(t.hersteller||'')}</small></td><td>${esc(t.lieferant||'—')}</td><td class="num">${t.ek?eur(t.ek):'—'}</td><td class="num">${t.vk?eur(t.vk):'—'}</td><td class="num">${t.verfuegbar==null?'—':t.verfuegbar}${t.lieferzeit?`<br><small class="muted">${esc(t.lieferzeit)}</small>`:''}</td><td class="num" style="white-space:nowrap"><button class="btn ghost sm" onclick="katalogUebernehmen(${i})">→ Lager</button><button class="btn sec sm" onclick="katalogBestellen(${i})">Bestellen</button></td></tr>`).join('')}</tbody></table></div>`;
  }catch(e){box.innerHTML=`<div class="warn">Live-Connector nicht erreichbar (${esc(String(e.message||e))}). Prüfe die Connector-URL in den Einstellungen — im Demo-Modus (URL leer) funktioniert die Suche ohne Server.</div>`;}
}
function katalogUebernehmen(i){const t=katLast[i];if(!t)return;const menge=+prompt('Wieviele Stück ins Lager übernehmen?','5')||0;if(menge<=0)return;
  let ex=parts.find(p=>p.nummer&&t.nummer&&p.nummer.toLowerCase()===t.nummer.toLowerCase());
  if(ex){ex.bestand=(+ex.bestand||0)+menge;if(t.ek)ex.ek=t.ek;if(t.vk)ex.vk=t.vk;}
  else parts.push({id:uid(),nummer:t.nummer,name:t.name,lieferant:t.lieferant||'',ek:+t.ek||0,vk:+t.vk||0,bestand:menge,minBestand:1});
  save('kfz_parts',parts);renderNav();alert(menge+'× '+t.name+' ins Lager übernommen.');renderParts();}
async function katalogBestellen(i){const t=katLast[i];if(!t)return;const menge=+prompt('Menge bestellen bei '+(t.lieferant||'Lieferant')+':','1')||0;if(menge<=0)return;
  const url=(settings.teileConnectorUrl||'').trim();
  try{
    let res;
    if(url){const r=await fetch(url.replace(/\/$/,'')+'/teile/bestellung',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({positionen:[{artikelnr:t.nummer,menge}],referenz:'Werkstatt'})});if(!r.ok)throw new Error('HTTP '+r.status);res=await r.json();}
    else res={bestellId:'DEMO-'+uid().toUpperCase(),status:'bestätigt (Demo)',voraussichtlich:t.lieferzeit||'nächster Werktag',summe:Math.round((+t.ek||0)*menge*100)/100};
    alert(`Bestellung ${res.bestellId}\n${menge}× ${t.name}\nStatus: ${res.status}\nSumme (EK): ${eur(res.summe||(+t.ek||0)*menge)}\nLieferung: ${res.voraussichtlich||'—'}`);
  }catch(e){alert('Bestellung fehlgeschlagen: '+(e.message||e)+'\nIm Demo-Modus (Connector-URL leer) funktioniert die Bestellung ohne Server.');}
}
/* ---------- CLOUD-SYNC (Supabase REST/Auth per fetch, ohne SDK) ---------- */
const SYNC_MAP={
  kfz_customers:{t:'kunde',cols:o=>({name:o.name,tel:o.tel,email:o.email,kennzeichen:o.kennzeichen,fahrzeug:o.fahrzeug})},
  kfz_invoices:{t:'beleg',cols:o=>({belegart:o.belegart,no:o.no,datum:o.datum,status:o.status,brutto:o.brutto,bezahlt_am:o.bezahltAm||null,kunde_name:o.kunde&&o.kunde.name})},
  kfz_expenses:{t:'ausgabe',cols:o=>({datum:o.datum,kategorie:o.kategorie,brutto:o.brutto})},
  kfz_appointments:{t:'termin',cols:o=>({datum:o.datum,zeit:o.zeit,kennzeichen:o.kennzeichen,leistung:o.leistung,status:o.status,kunde_name:o.kunde,tel:o.tel})},
  kfz_parts:{t:'teil',cols:o=>({nummer:o.nummer,bezeichnung:o.name,lieferant:o.lieferant,ek:o.ek,vk:o.vk,bestand:o.bestand,mindestbestand:o.minBestand})},
};
let syncTok=sessionStorage.getItem('kfz_sync_tok')||'';let syncBetrieb=sessionStorage.getItem('kfz_sync_betrieb')||'';
function syncBase(){return (settings.syncUrl||'').trim().replace(/\/$/,'');}
function syncHead(json){const h={apikey:settings.syncKey,Authorization:'Bearer '+(syncTok||settings.syncKey)};if(json)h['Content-Type']='application/json';return h;}
function syncStatus(msg,cls){const el=document.getElementById('syncStat');if(el)el.innerHTML=`<span class="${cls||'muted'}">${esc(msg)}</span>`;}
async function syncAuth(){const url=syncBase(),email=v('sy_mail'),pw=document.getElementById('sy_pw').value;
  if(!url||!settings.syncKey){alert('Bitte Supabase-URL und anon-Key eintragen und speichern.');return;}
  syncStatus('Anmeldung läuft…');
  try{
    const r=await fetch(url+'/auth/v1/token?grant_type=password',{method:'POST',headers:{apikey:settings.syncKey,'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    if(!r.ok)throw new Error('Login fehlgeschlagen ('+r.status+')');
    const d=await r.json();syncTok=d.access_token;sessionStorage.setItem('kfz_sync_tok',syncTok);
    const p=await fetch(url+'/rest/v1/profile?select=betrieb_id,rolle',{headers:syncHead()});
    const pj=await p.json();if(!pj.length)throw new Error('Kein Profil gefunden');
    syncBetrieb=pj[0].betrieb_id;sessionStorage.setItem('kfz_sync_betrieb',syncBetrieb);
    syncStatus('Angemeldet als '+esc(email)+' ('+esc(pj[0].rolle)+')','hsub');
  }catch(e){syncStatus('Fehler: '+(e.message||e)+' — Cloud-Sync läuft nur in der selbst-gehosteten Version.','muted');}
}
async function syncPush(){const url=syncBase();if(!syncTok||!syncBetrieb){alert('Bitte zuerst anmelden.');return;}
  syncStatus('Hochladen…');
  try{
    for(const[key,spec]of Object.entries(SYNC_MAP)){
      const list=JSON.parse(localStorage.getItem(key)||'[]');if(!Array.isArray(list)||!list.length)continue;
      const rows=list.map(o=>({id:o.id,betrieb_id:syncBetrieb,daten:o,updated_at:new Date().toISOString(),deleted:false,...spec.cols(o)}));
      const r=await fetch(url+'/rest/v1/'+spec.t+'?on_conflict=betrieb_id,id',{method:'POST',headers:{...syncHead(true),Prefer:'resolution=merge-duplicates'},body:JSON.stringify(rows)});
      if(!r.ok)throw new Error(spec.t+': '+r.status+' '+(await r.text()).slice(0,80));
    }
    const set=JSON.parse(localStorage.getItem('kfz_settings')||'null');
    if(set){const r=await fetch(url+'/rest/v1/einstellung?on_conflict=betrieb_id',{method:'POST',headers:{...syncHead(true),Prefer:'resolution=merge-duplicates'},body:JSON.stringify({betrieb_id:syncBetrieb,daten:set,updated_at:new Date().toISOString()})});if(!r.ok)throw new Error('einstellung: '+r.status);}
    syncStatus('Hochgeladen ✓','hsub');
  }catch(e){syncStatus('Fehler beim Hochladen: '+(e.message||e),'muted');}
}
async function syncPull(){const url=syncBase();if(!syncTok||!syncBetrieb){alert('Bitte zuerst anmelden.');return;}
  if(!confirm('Cloud-Daten laden und lokale überschreiben?'))return;
  syncStatus('Herunterladen…');
  try{
    for(const[key,spec]of Object.entries(SYNC_MAP)){
      const r=await fetch(url+'/rest/v1/'+spec.t+'?betrieb_id=eq.'+syncBetrieb+'&select=daten,deleted',{headers:syncHead()});
      if(!r.ok)throw new Error(spec.t+': '+r.status);
      const d=await r.json();localStorage.setItem(key,JSON.stringify(d.filter(x=>!x.deleted).map(x=>x.daten)));
    }
    const r=await fetch(url+'/rest/v1/einstellung?betrieb_id=eq.'+syncBetrieb+'&select=daten',{headers:syncHead()});
    const ej=await r.json();if(ej.length&&ej[0].daten)localStorage.setItem('kfz_settings',JSON.stringify(ej[0].daten));
    syncStatus('Heruntergeladen ✓ — App wird neu geladen…','hsub');setTimeout(()=>location.reload(),700);
  }catch(e){syncStatus('Fehler beim Herunterladen: '+(e.message||e),'muted');}
}
const v=id=>document.getElementById(id).value.trim();
renderNav();render();
</script>
